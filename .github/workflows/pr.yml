name: PR Pipeline
on:
  pull_request:
    branches: [master]
jobs:
  validate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v3
        with:
          go-version: ">=1.19.3"
      - run: apt update && apt install -y make
      - name: Build scroll tree
        run: make build-tree
      - name: Validate all scrolls
        run: ./scripts/validate_all_scrolls.sh
