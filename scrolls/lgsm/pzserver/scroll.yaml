name: artifacts.druid.gg/druid-team/scroll-lgsm
desc: pzserver
version: 0.0.2
app_version: pzserver
keepAlivePPM: 5
chunks:
  - name: configure-pzserver
    path: configure-pzserver.sh
  - name: install-lgsm
    path: install-lgsm.sh
  - name: lgsm
    path: lgsm
  - name: linuxgsm
    path: linuxgsm.sh
  - name: log
    path: log
  - name: patch-lgsm-permissions
    path: patch-lgsm-permissions.sh
  - name: pzserver
    path: pzserver
  - name: serverfiles
    path: serverfiles
    chunks:
      - name: media
        path: media
      - name: steamapps
        path: steamapps
      - name: zombie
        path: zombie

ports:
- name: main
  protocol: udp
  port: 16261
  description: Main game port. Use this port inside of your game client to connect to the server. Depending on the game you might need the query port to connect.
- name: main2
  protocol: udp
  port: 16262
- name: maintcp
  protocol: tcp
  port: 16261
commands:
  console:
    needs:
    - start
    run: restart
    procedures:
    - id: coldstart
      image: artifacts.druid.gg/druid-team/druid:v0.1.249
      expectedPorts:
      - name: main
        keepAliveTraffic: 1mb/5m
      - name: main2
        keepAliveTraffic: 1mb/5m
      - name: maintcp
      mounts:
      - path: "/runtime"
        sub_path: "."
      working_dir: "/runtime"
      env:
        DRUID_ROOT: "/runtime"
        DRUID_PORT_MAIN_COLDSTARTER: "packet_handler/query.lua"
        DRUID_COLDSTARTER_VAR_GAME_NAME: "Project Zomboid"
        DRUID_COLDSTARTER_VAR_GAME_STEAM_FOLDER: "zomboid"
        DRUID_COLDSTARTER_VAR_GAME_STEAM_ID: "0"
        DRUID_COLDSTARTER_VAR_MAP_NAME: "server idle"
        DRUID_COLDSTARTER_VAR_SERVER_LIST_NAME: "Druid.gg Server (idle) - join to start"
        DRUID_COLDSTARTER_VAR_START_ON_UNKNOWN_PACKET: "yes"
        DRUID_COLDSTARTER_VAR_STEAM_APP_ID: "108600"
        DRUID_PORT_MAIN2_COLDSTARTER: "generic"
        DRUID_PORT_MAINTCP_COLDSTARTER: "generic"
      command:
      - druid-coldstarter
    - id: start
      image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      expectedPorts:
      - name: main
        keepAliveTraffic: 1mb/5m
      - name: main2
        keepAliveTraffic: 1mb/5m
      - name: maintcp
      mounts:
      - path: "/server"
      working_dir: "/server"
      tty: true
      command:
      - sh
      - -lc
      - sh configure-pzserver.sh && ./pzserver start && exec ./pzserver console
  start:
    needs:
    - install
    procedures:
    - ignore_failure: true
      image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pzserver
      - update
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - -lc
      - sh configure-pzserver.sh && ./pzserver start
  stop:
    run: always
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pzserver
      - stop
  restart:
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Restarting server...
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pzserver
      - restart
  install:
    run: once
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Installing LGSM...
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - install-lgsm.sh
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./linuxgsm.sh
      - pzserver
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - patch-lgsm-permissions.sh
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pzserver
      - auto-install
serve: console
