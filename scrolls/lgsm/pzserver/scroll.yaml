name: artifacts.druid.gg/druid-team/scroll-lgsm
desc: pzserver
version: 0.0.2
app_version: pzserver
keepAlivePPM: 5
ports:
- name: main
  protocol: udp
  description: Steam Query Port. Use this to connect via the Steam client.
commands:
  console:
    needs:
    - start
    run: restart
    procedures:
    - id: coldstart
      image: artifacts.druid.gg/druid-team/druid:stable
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
      mounts:
      - path: "/runtime"
        sub_path: "."
      working_dir: "/runtime"
      env:
        DRUID_ROOT: "/runtime"
        DRUID_PORT_MAIN_COLDSTARTER: "packet_handler/query.lua"
        DRUID_COLDSTARTER_VAR_GAME_NAME: "Project Zomboid"
        DRUID_COLDSTARTER_VAR_GAME_STEAM_FOLDER: "zomboid"
        DRUID_COLDSTARTER_VAR_GAME_STEAM_ID: "0"
        DRUID_COLDSTARTER_VAR_MAP_NAME: "server idle"
        DRUID_COLDSTARTER_VAR_SERVER_LIST_NAME: "Druid.gg Server (idle) - join to start"
        DRUID_COLDSTARTER_VAR_START_ON_UNKNOWN_PACKET: "yes"
        DRUID_COLDSTARTER_VAR_STEAM_APP_ID: "108600"
      command:
      - druid-coldstarter
    - id: start
      image: highcard/druid:stable-steamcmd
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
      mounts:
      - path: "/server"
      working_dir: "/server"
      tty: true
      command:
      - ./pzserver
      - console
  start:
    needs:
    - install
    procedures:
    - ignore_failure: true
      image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pzserver
      - update
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pzserver
      - start
  stop:
    run: always
    procedures:
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pzserver
      - stop
  restart:
    procedures:
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Restarting server...
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pzserver
      - restart
  install:
    run: once
    procedures:
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Installing LGSM...
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - install-lgsm.sh
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./linuxgsm.sh
      - pzserver
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pzserver
      - auto-install
serve: console
