name: artifacts.druid.gg/druid-team/scroll-lgsm
desc: pzserver
version: 0.0.2
app_version: pzserver
keepAlivePPM: 5
ports:
- name: main
  protocol: udp
  description: Steam Query Port. Use this to connect via the Steam client.
  start_delay: 0
  finish_after_command: install
  sleep_handler: packet_handler/query.lua
  vars:
  - name: GameName
    value: "Project Zomboid"
  - name: GameSteamFolder
    value: zomboid
  - name: GameSteamId
    value: "0"
  - name: MapName
    value: server idle
  - name: ServerListName
    value: "Druid.gg Server (idle) - join to start"
  - name: StartOnUnknownPacket
    value: "yes"
  - name: SteamAppId
    value: "108600"
commands:
  console:
    needs:
    - start
    run: restart
    procedures:
    - id: coldstart
      image: artifacts.druid.gg/druid-team/druid:stable
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
      mounts:
      - path: "/runtime"
        sub_path: "."
      working_dir: "/runtime"
      env:
        DRUID_ROOT: "/runtime"
        DRUID_COLDSTARTER_STATUS_FILE: ".coldstarter-finished.json"
      command:
      - druid-coldstarter
    - id: start
      image: highcard/druid:stable-steamcmd
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
      mounts:
      - path: "/server"
      working_dir: "/server"
      tty: true
      command:
      - ./pzserver
      - console
  start:
    needs:
    - install
    procedures:
    - ignore_failure: true
      image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pzserver
      - update
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pzserver
      - start
  stop:
    run: always
    procedures:
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pzserver
      - stop
  restart:
    procedures:
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Restarting server...
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pzserver
      - restart
  install:
    run: once
    procedures:
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Installing LGSM...
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - install-lgsm.sh
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./linuxgsm.sh
      - pzserver
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pzserver
      - auto-install
serve: console
