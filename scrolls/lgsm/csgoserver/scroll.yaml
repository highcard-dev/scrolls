name: artifacts.druid.gg/druid-team/scroll-lgsm
desc: csgoserver
version: 0.0.2
app_version: csgoserver
keepAlivePPM: 600
ports:
- name: query
  protocol: udp
  description: Steam Query Port. Use this to connect via the Steam client.
- name: main
  description: Main game port. Use this port inside of your game client to connect to the server. Depending on the game you might need the query port to connect.
  protocol: udp
commands:
  console:
    needs:
    - start
    run: restart
    procedures:
    - id: coldstart
      image: artifacts.druid.gg/druid-team/druid:v0.1.243
      expectedPorts:
      - name: query
        keepAliveTraffic: 10kb/5m
      - name: main
        keepAliveTraffic: 10kb/5m
      mounts:
      - path: "/runtime"
        sub_path: "."
      working_dir: "/runtime"
      env:
        DRUID_ROOT: "/runtime"
        DRUID_PORT_QUERY_COLDSTARTER: "packet_handler/query.lua"
        DRUID_COLDSTARTER_VAR_GAME_NAME: "Counter-Strike: Global Offensive"
        DRUID_COLDSTARTER_VAR_GAME_STEAM_FOLDER: "csgo"
        DRUID_COLDSTARTER_VAR_GAME_STEAM_ID: "0"
        DRUID_COLDSTARTER_VAR_MAP_NAME: "server idle"
        DRUID_COLDSTARTER_VAR_SERVER_LIST_NAME: "Druid.gg Server (idle) - join to start"
        DRUID_COLDSTARTER_VAR_STEAM_APP_ID: "730"
        DRUID_PORT_MAIN_COLDSTARTER: "generic"
      command:
      - druid-coldstarter
    - id: start
      image: artifacts.druid.gg/druid-team/druid:v0.1.243-steamcmd
      expectedPorts:
      - name: query
        keepAliveTraffic: 10kb/5m
      - name: main
        keepAliveTraffic: 10kb/5m
      mounts:
      - path: "/server"
      working_dir: "/server"
      tty: true
      command:
      - ./csgoserver
      - console
  start:
    needs:
    - install
    procedures:
    - ignore_failure: true
      image: artifacts.druid.gg/druid-team/druid:v0.1.243-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./csgoserver
      - update
    - image: artifacts.druid.gg/druid-team/druid:v0.1.243-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./csgoserver
      - start
  stop:
    run: always
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.243-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./csgoserver
      - stop
  restart:
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.243-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Restarting server...
    - image: artifacts.druid.gg/druid-team/druid:v0.1.243-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./csgoserver
      - restart
  install:
    run: once
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.243-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Installing LGSM...
    - image: artifacts.druid.gg/druid-team/druid:v0.1.243-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - install-lgsm.sh
    - image: artifacts.druid.gg/druid-team/druid:v0.1.243-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./linuxgsm.sh
      - csgoserver
    - image: artifacts.druid.gg/druid-team/druid:v0.1.243-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./csgoserver
      - auto-install
serve: console
