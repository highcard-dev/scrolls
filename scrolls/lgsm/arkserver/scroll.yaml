name: artifacts.druid.gg/druid-team/scroll-lgsm
desc: arkserver
version: 0.0.2
app_version: arkserver
keepAlivePPM: 5
chunks:
  - name: install-lgsm
    path: install-lgsm.sh
  - name: lgsm-launcher
    path: arkserver
  - name: linuxgsm
    path: linuxgsm.sh
  - name: lgsm
    path: lgsm
  - name: patch-lgsm-permissions
    path: patch-lgsm-permissions.sh
  - name: serverfiles
    path: serverfiles
    chunks:
      - name: server-engine
        path: Engine
      - name: server-linux64
        path: linux64
      - name: server-steamapps
        path: steamapps
      - name: shootergame
        path: ShooterGame
        chunks:
          - name: shootergame-binaries
            path: Binaries
          - name: shootergame-config
            path: Config
          - name: shootergame-saved
            path: Saved
          - name: content
            path: Content
            chunks:
              - name: maps
                path: Maps/*
              - name: mods
                path: Mods/*
              - name: movies
                path: Movies/*
              - name: reflectioncaptures
                path: ReflectionCaptures/*

ports:
- name: main
  protocol: udp
  description: Main game port. Use this port inside of your game client to connect to the server. Depending on the game you might need the query port to connect.
- name: query
  protocol: udp
  description: Steam Query Port. Use this to connect via the Steam client.
- name: rcon
  protocol: tcp
commands:
  console:
    needs:
    - start
    run: restart
    procedures:
    - id: coldstart
      image: artifacts.druid.gg/druid-team/druid:v0.1.249
      expectedPorts:
      - name: query
        keepAliveTraffic: 6mb/30m
      - name: main
        keepAliveTraffic: 6mb/30m
      - name: rcon
      mounts:
      - path: "/runtime"
        sub_path: "."
      working_dir: "/runtime"
      env:
        DRUID_ROOT: "/runtime"
        DRUID_PORT_QUERY_COLDSTARTER: "packet_handler/query.lua"
        DRUID_COLDSTARTER_VAR_GAME_NAME: "ARK: Survival Evolved"
        DRUID_COLDSTARTER_VAR_GAME_STEAM_FOLDER: "ark_survival_evolved"
        DRUID_COLDSTARTER_VAR_GAME_STEAM_ID: "0"
        DRUID_COLDSTARTER_VAR_MAP_NAME: "server idle"
        DRUID_COLDSTARTER_VAR_SERVER_LIST_NAME: "Druid.gg Server (idle) - join to start"
        DRUID_COLDSTARTER_VAR_STEAM_APP_ID: "346110"
        DRUID_PORT_MAIN_COLDSTARTER: "generic"
        DRUID_PORT_RCON_COLDSTARTER: "generic"
      command:
      - druid-coldstarter
    - id: start
      image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      expectedPorts:
      - name: query
        keepAliveTraffic: 6mb/30m
      - name: main
        keepAliveTraffic: 6mb/30m
      - name: rcon
      mounts:
      - path: "/server"
      working_dir: "/server"
      tty: true
      command:
      - sh
      - -lc
      - ./arkserver start && exec ./arkserver console
  start:
    needs:
    - install
    procedures:
    - ignore_failure: true
      image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./arkserver
      - update
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./arkserver
      - start
  stop:
    run: always
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./arkserver
      - stop
  restart:
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Restarting server...
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./arkserver
      - restart
  install:
    run: once
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Installing LGSM...
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - install-lgsm.sh
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./linuxgsm.sh
      - arkserver
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - patch-lgsm-permissions.sh
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./arkserver
      - auto-install
serve: console
