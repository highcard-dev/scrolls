name: artifacts.druid.gg/druid-team/scroll-lgsm
desc: dayzserver
version: 0.0.2
app_version: dayzserver
keepAlivePPM: 5
ports:
- name: main
  description: Main game port. Use this port inside of your game client to connect to the server. Depending on the game you might need the query port to connect.
  protocol: udp
commands:
  console:
    needs:
    - start
    run: restart
    procedures:
    - id: coldstart
      image: artifacts.druid.gg/druid-team/druid:v0.1.246
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
      mounts:
      - path: "/runtime"
        sub_path: "."
      working_dir: "/runtime"
      env:
        DRUID_ROOT: "/runtime"
        DRUID_PORT_MAIN_COLDSTARTER: "generic"
      command:
      - druid-coldstarter
    - id: start
      image: artifacts.druid.gg/druid-team/druid:v0.1.246-steamcmd
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
      mounts:
      - path: "/server"
      working_dir: "/server"
      tty: true
      command:
      - ./dayzserver
      - console
  start:
    needs:
    - install
    procedures:
    - ignore_failure: true
      image: artifacts.druid.gg/druid-team/druid:v0.1.246-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./dayzserver
      - update
    - image: artifacts.druid.gg/druid-team/druid:v0.1.246-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./dayzserver
      - start
  stop:
    run: always
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.246-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./dayzserver
      - stop
  restart:
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.246-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Restarting server...
    - image: artifacts.druid.gg/druid-team/druid:v0.1.246-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./dayzserver
      - restart
  install:
    run: once
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.246-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Installing LGSM...
    - image: artifacts.druid.gg/druid-team/druid:v0.1.246-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - install-lgsm.sh
    - image: artifacts.druid.gg/druid-team/druid:v0.1.246-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./linuxgsm.sh
      - dayzserver
    - image: artifacts.druid.gg/druid-team/druid:v0.1.246-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./dayzserver
      - auto-install
serve: console
