name: artifacts.druid.gg/druid-team/scroll-lgsm
desc: pwserver
version: 0.0.2
app_version: pwserver
ports:
- name: main
  description: Main game port. Use this port inside of your game client to connect
    to the server. Depending on the game you might need the query port to connect.
  protocol: udp
  start_delay: 0
  finish_after_command: install
  sleep_handler: generic
  port: 8211
commands:
  console:
    needs:
    - start
    run: restart
    procedures:
    - id: coldstart
      image: artifacts.druid.gg/druid-team/druid:stable
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
      mounts:
      - path: "/runtime"
        sub_path: "."
      working_dir: "/runtime"
      command:
      - druid-coldstarter
      - "--root"
      - "/runtime"
      - "--status-file"
      - ".coldstarter-finished.json"
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      tty: true
      command:
      - "./pwserver"
      - console
      id: start
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
  start:
    needs:
    - install
    procedures:
    - ignore_failure: true
      image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - "./pwserver"
      - update
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - "./pwserver"
      - start
  stop:
    procedures:
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - "./pwserver"
      - stop
    run: always
  restart:
    procedures:
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Restarting server...
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - "./pwserver"
      - restart
  install:
    run: once
    procedures:
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Installing LGSM...
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - install-lgsm.sh
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - "./linuxgsm.sh"
      - pwserver
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - "./pwserver"
      - auto-install
serve: console
