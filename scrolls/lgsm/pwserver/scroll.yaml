name: artifacts.druid.gg/druid-team/scroll-lgsm
desc: pwserver
version: 0.0.2
app_version: pwserver
keepAlivePPM: 5
ports:
- name: main
  protocol: udp
  port: 8211
  description: Main game port. Use this port inside of your game client to connect to the server. Depending on the game you might need the query port to connect.
- name: rcon
  protocol: tcp
  port: 25575
commands:
  console:
    needs:
    - start
    run: restart
    procedures:
    - id: coldstart
      image: artifacts.druid.gg/druid-team/druid:v0.1.249
      expectedPorts:
      - name: main
        keepAliveTraffic: 1mb/5m
      mounts:
      - path: "/runtime"
        sub_path: "."
      working_dir: "/runtime"
      env:
        DRUID_ROOT: "/runtime"
        DRUID_PORT_MAIN_COLDSTARTER: "generic"
      command:
      - druid-coldstarter
    - id: start
      image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      expectedPorts:
      - name: main
        keepAliveTraffic: 1mb/5m
      mounts:
      - path: "/server"
      working_dir: "/server"
      tty: true
      command:
      - sh
      - -lc
      - ./pwserver start && exec ./pwserver console
  start:
    needs:
    - install
    procedures:
    - ignore_failure: true
      image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pwserver
      - update
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pwserver
      - start
  stop:
    run: always
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pwserver
      - stop
  restart:
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Restarting server...
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pwserver
      - restart
  install:
    run: once
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Installing LGSM...
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - install-lgsm.sh
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./linuxgsm.sh
      - pwserver
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - patch-lgsm-permissions.sh
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./pwserver
      - auto-install
serve: console
