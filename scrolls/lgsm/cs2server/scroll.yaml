name: artifacts.druid.gg/druid-team/scroll-lgsm
desc: cs2server
version: 0.0.2
app_version: cs2server
keepAlivePPM: 5
chunks:
  - name: install-lgsm
    path: install-lgsm.sh
  - name: lgsm-launcher
    path: cs2server
  - name: linuxgsm
    path: linuxgsm.sh
  - name: lgsm
    path: lgsm
  - name: log
    path: log
  - name: postinstall
    path: postinstall.sh
  - name: postinstall-template
    path: postinstall.sh.scroll_template
  - name: serverfiles
    path: serverfiles
    chunks:
      - name: steamapps
        path: steamapps
      - name: game
        path: game
        chunks:
          - name: game-bin
            path: bin
          - name: game-core
            path: core
          - name: csgo
            path: csgo
            chunks:
              - name: csgo-bin
                path: bin
              - name: csgo-cfg
                path: cfg
              - name: csgo-logs
                path: logs
              - name: csgo-maps
                path: maps
              - name: csgo-panorama
                path: panorama
              - name: csgo-resource
                path: resource
              - name: csgo-pak
                path: pak01_*.vpk
              - name: csgo-shaders-vulkan
                path: shaders_vulkan_*.vpk
          - name: csgo-community-addons
            path: csgo_community_addons
          - name: csgo-core
            path: csgo_core
          - name: csgo-imported
            path: csgo_imported
          - name: csgo-lv
            path: csgo_lv

ports:
  - name: main
    protocol: udp
    description: Steam Query Port. Use this to connect via the Steam client.
    start_delay: 0
    finish_after_command: install
    sleep_handler: packet_handler/query.lua
    vars:
      - name: GameName
        value: "CS2: Druid Server"
      - name: GameSteamFolder
        value: csgo
      - name: GameSteamId
        value: "0"
      - name: MapName
        value: server idle
      - name: ServerListName
        value: "Druid.gg Server (idle) - join to start"
      - name: StartOnUnknownPacket
        value: "yes"
      - name: SteamAppId
        value: "730"
init: "console"
commands:
  console:
    needs: [start]
    run: restart
    dependencies:
      - bc
      - binutils
      - bzip2
      - cpio
      - file
      - jq
      - pkgsi686Linux.gcc
      - netcat
      - pigz
      - python3
      - tmux
      - unzip
      - util-linux
      - moreutils
      - iproute2
    procedures:
      - mode: stdin
        wait: 5
        data:
          - 'console.1'
          - "\r"
      - mode: exec-tty
        data:
          - ./cs2server
          - console
  start:
    needs: [install]
    dependencies:
      - bc
      - binutils
      - bzip2
      - cpio
      - file
      - jq
      - pkgsi686Linux.gcc
      - netcat
      - pigz
      - python3
      - tmux
      - unzip
      - util-linux
      - moreutils
      - iproute2
    procedures:
      - mode: exec
        ignore_failure: true
        data:
          - ./cs2server
          - update
      - mode: exec
        data:
          - ./cs2server
          - start
  stop:
    procedures:
      - mode: exec
        data:
          - ./cs2server
          - stop
  restart:
    dependencies:
      - bc
      - binutils
      - bzip2
      - cpio
      - file
      - jq
      - pkgsi686Linux.gcc
      - netcat
      - pigz
      - python3
      - tmux
      - unzip
      - util-linux
      - moreutils
      - iproute2
    procedures:
      - mode: exec
        data:
          - echo
          - "Restarting server..."
      - mode: exec
        data:
          - ./cs2server
          - restart
      - mode: command
        data: console
  install:
    dependencies:
      - bc
      - binutils
      - bzip2
      - cpio
      - file
      - jq
      - pkgsi686Linux.gcc
      - netcat
      - pigz
      - python3
      - tmux
      - unzip
      - util-linux
      - moreutils
      - iproute2
    run: once
    procedures:
      - mode: exec
        data:
          - echo
          - "Installing LGSM..."
      - mode: exec
        data:
          - sh
          - install-lgsm.sh
      - mode: exec
        data:
          - ./linuxgsm.sh
          - cs2server
      - mode: exec
        data:
          - ./cs2server
          - auto-install
      - mode: exec
        data:
          - bash
          - postinstall.sh
cronjobs:
  - name: Restart every 6 hours
    schedule: "0 */6 * * *"
    command: restart
plugins:
  rcon: {}