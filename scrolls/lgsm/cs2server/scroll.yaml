name: artifacts.druid.gg/druid-team/scroll-lgsm
desc: cs2server
version: 0.0.2
app_version: cs2server
keepAlivePPM: 5
chunks:
  - name: install-lgsm
    path: install-lgsm.sh
  - name: lgsm-launcher
    path: cs2server
  - name: linuxgsm
    path: linuxgsm.sh
  - name: lgsm
    path: lgsm
  - name: log
    path: log
  - name: postinstall
    path: postinstall.sh
  - name: patch-lgsm-permissions
    path: patch-lgsm-permissions.sh
  - name: serverfiles
    path: serverfiles
    chunks:
      - name: steamapps
        path: steamapps
      - name: game
        path: game
        chunks:
          - name: game-bin
            path: bin
          - name: game-core
            path: core
          - name: csgo
            path: csgo
            chunks:
              - name: csgo-bin
                path: bin
              - name: csgo-cfg
                path: cfg
              - name: csgo-logs
                path: logs
              - name: csgo-maps
                path: maps
              - name: csgo-panorama
                path: panorama
              - name: csgo-resource
                path: resource
              - name: csgo-pak
                path: pak01_*.vpk
              - name: csgo-shaders-vulkan
                path: shaders_vulkan_*.vpk
          - name: csgo-community-addons
            path: csgo_community_addons
          - name: csgo-core
            path: csgo_core
          - name: csgo-imported
            path: csgo_imported
          - name: csgo-lv
            path: csgo_lv

ports:
- name: main
  protocol: udp
  port: 27015
  description: Main game port. Use this port inside of your game client to connect to the server. Depending on the game you might need the query port to connect.
- name: rcon
  protocol: tcp
  port: 27015
commands:
  console:
    needs:
    - start
    run: restart
    procedures:
    - id: coldstart
      image: artifacts.druid.gg/druid-team/druid:v0.1.247
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
      mounts:
      - path: "/runtime"
        sub_path: "."
      working_dir: "/runtime"
      env:
        DRUID_ROOT: "/runtime"
        DRUID_PORT_MAIN_COLDSTARTER: "packet_handler/query.lua"
        DRUID_COLDSTARTER_VAR_GAME_NAME: "CS2: Druid Server"
        DRUID_COLDSTARTER_VAR_GAME_STEAM_FOLDER: "csgo"
        DRUID_COLDSTARTER_VAR_GAME_STEAM_ID: "0"
        DRUID_COLDSTARTER_VAR_MAP_NAME: "server idle"
        DRUID_COLDSTARTER_VAR_SERVER_LIST_NAME: "Druid.gg Server (idle) - join to start"
        DRUID_COLDSTARTER_VAR_START_ON_UNKNOWN_PACKET: "yes"
        DRUID_COLDSTARTER_VAR_STEAM_APP_ID: "730"
      command:
      - druid-coldstarter
    - id: start
      image: artifacts.druid.gg/druid-team/druid:v0.1.247-steamcmd
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
      mounts:
      - path: "/server"
      working_dir: "/server"
      tty: true
      command:
      - sh
      - -lc
      - ./cs2server start && exec ./cs2server console
  start:
    needs:
    - install
    procedures:
    - ignore_failure: true
      image: artifacts.druid.gg/druid-team/druid:v0.1.247-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./cs2server
      - update
    - image: artifacts.druid.gg/druid-team/druid:v0.1.247-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./cs2server
      - start
  stop:
    run: always
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.247-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./cs2server
      - stop
  restart:
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.247-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Restarting server...
    - image: artifacts.druid.gg/druid-team/druid:v0.1.247-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./cs2server
      - restart
  install:
    run: once
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.247-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Installing LGSM...
    - image: artifacts.druid.gg/druid-team/druid:v0.1.247-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - install-lgsm.sh
    - image: artifacts.druid.gg/druid-team/druid:v0.1.247-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./linuxgsm.sh
      - cs2server
    - image: artifacts.druid.gg/druid-team/druid:v0.1.247-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - patch-lgsm-permissions.sh
    - image: artifacts.druid.gg/druid-team/druid:v0.1.247-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./cs2server
      - auto-install
    - image: artifacts.druid.gg/druid-team/druid:v0.1.247-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - bash
      - postinstall.sh
serve: console
