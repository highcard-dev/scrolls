name: artifacts.druid.gg/druid-team/scroll-lgsm
desc: gmodserver
version: 0.0.2
app_version: gmodserver
keepAlivePPM: 5
ports:
- name: query
  protocol: udp
  port: 27005
  description: Steam Query Port. Use this to connect via the Steam client.
- name: main
  protocol: udp
  port: 27015
  description: Main game port. Use this port inside of your game client to connect to the server. Depending on the game you might need the query port to connect.
- name: sourcetv
  protocol: udp
  port: 27020
- name: steam
  protocol: tcp
  port: 27015
commands:
  console:
    needs:
    - start
    run: restart
    procedures:
    - id: coldstart
      image: artifacts.druid.gg/druid-team/druid:v0.1.248
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
      mounts:
      - path: "/runtime"
        sub_path: "."
      working_dir: "/runtime"
      env:
        DRUID_ROOT: "/runtime"
        DRUID_PORT_MAIN_COLDSTARTER: "packet_handler/query.lua"
        DRUID_COLDSTARTER_VAR_GAME_NAME: "Idle Druid Server"
        DRUID_COLDSTARTER_VAR_GAME_STEAM_FOLDER: "garrysmod"
        DRUID_COLDSTARTER_VAR_GAME_STEAM_ID: "0"
        DRUID_COLDSTARTER_VAR_MAP_NAME: "server idle"
        DRUID_COLDSTARTER_VAR_SERVER_LIST_NAME: "Druid.gg Server (idle) - join to start"
        DRUID_COLDSTARTER_VAR_GAME_KEYWORDS: " ver:250717"
        DRUID_COLDSTARTER_VAR_GAME_VERSION: "2025.03.26"
        DRUID_COLDSTARTER_VAR_GAME_VERSION_PREFIX: "01"
        DRUID_COLDSTARTER_VAR_START_ON_UNKNOWN_PACKET: "yes"
        DRUID_COLDSTARTER_VAR_STEAM_APP_ID: "4000"
      command:
      - druid-coldstarter
    - id: start
      image: artifacts.druid.gg/druid-team/druid:v0.1.248-steamcmd
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
      mounts:
      - path: "/server"
      working_dir: "/server"
      tty: true
      command:
      - sh
      - -lc
      - ./gmodserver start && exec ./gmodserver console
  start:
    needs:
    - install
    procedures:
    - ignore_failure: true
      image: artifacts.druid.gg/druid-team/druid:v0.1.248-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./gmodserver
      - update
    - image: artifacts.druid.gg/druid-team/druid:v0.1.248-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./gmodserver
      - start
  stop:
    run: always
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.248-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./gmodserver
      - stop
  restart:
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.248-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Restarting server...
    - image: artifacts.druid.gg/druid-team/druid:v0.1.248-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./gmodserver
      - restart
  install:
    run: once
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.248-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - echo
      - Installing LGSM...
    - image: artifacts.druid.gg/druid-team/druid:v0.1.248-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - install-lgsm.sh
    - image: artifacts.druid.gg/druid-team/druid:v0.1.248-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./linuxgsm.sh
      - gmodserver
    - image: artifacts.druid.gg/druid-team/druid:v0.1.248-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - patch-lgsm-permissions.sh
    - image: artifacts.druid.gg/druid-team/druid:v0.1.248-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - ./gmodserver
      - auto-install
serve: console
