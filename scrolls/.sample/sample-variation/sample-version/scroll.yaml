name: sample@1.23
desc: Sample Game
version: 0.0.1
app_version: 0.0.1
commands:
  start:
    procedures:
    - image: alpine:3.20
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "./start.sh"
      id: start
  stop:
    procedures:
    - type: signal
      target: start
      signal: SIGTERM
    run: always
  install:
    procedures:
    - image: alpine:3.20
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "-c"
      - echo sample install complete
    run: once
serve: start
