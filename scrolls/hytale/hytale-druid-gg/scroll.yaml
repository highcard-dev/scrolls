name: artifacts.druid.gg/druid-team/scroll-hytale
desc: Hytale
version: 0.0.1
app_version: latest
ports:
- name: main
  protocol: udp
  port: 5520
commands:
  install:
    run: once
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:stable
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - wget
      - "-q"
      - "-O"
      - update-server.sh
      - https://github.com/highcard-dev/hsm/releases/latest/download/gsp-update-hytale-server.sh
    - image: artifacts.druid.gg/druid-team/druid:stable
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - wget
      - "-q"
      - "-O"
      - start-server.sh
      - https://github.com/highcard-dev/hsm/releases/latest/download/gsp-start-hytale-server.sh
    - image: artifacts.druid.gg/druid-team/druid:stable
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - chmod
      - "+x"
      - update-server.sh
      - start-server.sh
  install-server:
    run: once
    needs:
    - install
    procedures:
    - image: eclipse-temurin:25-jre
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "-c"
      - HSM_URL="https://hytale.druid.gg" JWT_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
        ./update-server.sh
  start:
    needs:
    - install-server
    procedures:
    - image: eclipse-temurin:25-jre
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "-c"
      - HSM_URL="https://hytale.druid.gg" JWT_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
        ./start-server.sh
      id: start
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/30m
    run: restart
serve: start
