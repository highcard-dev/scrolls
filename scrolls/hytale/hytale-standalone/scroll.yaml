name: artifacts.druid.gg/druid-team/scroll-hytale
desc: Hytale
version: 0.0.1
app_version: standalone
ports:
- name: main
  protocol: udp
  port: 5520
commands:
  install-hsm:
    run: once
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:stable
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - install.sh
  login:
    run: once
    needs:
    - install-hsm
    procedures:
    - id: authenticate-hytale
      image: eclipse-temurin:25-jre
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - "./hsm"
      - login
  update:
    needs:
    - login
    procedures:
    - id: install-hytale-server
      image: eclipse-temurin:25-jre
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - "./hsm"
      - update
  start:
    needs:
    - update
    procedures:
    - image: eclipse-temurin:25-jre
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - "./hsm"
      - start
      id: start
      expectedPorts:
      - name: main
        keepAliveTraffic: 60kb/30m
    run: restart
serve: start
