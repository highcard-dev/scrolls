name: artifacts.druid.gg/druid-team/scroll-rust-oxide
desc: Rust Oxide
version: 0.10.7
app_version: latest
ports:
- name: main
  protocol: udp
- name: query
  protocol: udp
  description: Steam Query Port. Use this to connect via the Steam client.
- name: rustplus
  protocol: tcp
- name: rcon
  protocol: tcp
commands:
  start:
    needs:
    - install
    run: restart
    procedures:
    - id: coldstart
      image: artifacts.druid.gg/druid-team/druid:v0.1.249
      expectedPorts:
      - name: main
        keepAliveTraffic: 3mb/30m
      - name: query
        keepAliveTraffic: 3mb/30m
      - name: rustplus
        keepAliveTraffic: 3mb/30m
      - name: rcon
      mounts:
      - path: "/runtime"
        sub_path: "."
      working_dir: "/runtime"
      env:
        DRUID_ROOT: "/runtime"
        DRUID_PORT_MAIN_COLDSTARTER: "generic"
        DRUID_PORT_QUERY_COLDSTARTER: "packet_handler/query.lua"
        DRUID_PORT_RUSTPLUS_COLDSTARTER: "generic"
        DRUID_PORT_RCON_COLDSTARTER: "generic"
        DRUID_COLDSTARTER_VAR_GAME_NAME: "Rust"
        DRUID_COLDSTARTER_VAR_GAME_STEAM_FOLDER: "rust"
        DRUID_COLDSTARTER_VAR_GAME_STEAM_ID: "0"
        DRUID_COLDSTARTER_VAR_MAP_NAME: "Procedual Map"
        DRUID_COLDSTARTER_VAR_SERVER_LIST_NAME: "Druid Gameserver (idle) - Start server by joining"
        DRUID_COLDSTARTER_VAR_GAME_VERSION: "1337"
        DRUID_COLDSTARTER_VAR_GAME_KEYWORDS: "mp0,cp0,ptrak,qp0,$r?,v2592,born0,gmrust,cs1337420"
      command:
      - druid-coldstarter
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "./start.sh"
      id: start
      expectedPorts:
      - name: main
        keepAliveTraffic: 3mb/30m
      - name: query
        keepAliveTraffic: 3mb/30m
      - name: rustplus
        keepAliveTraffic: 3mb/30m
      - name: rcon
  stop:
    procedures:
    - type: signal
      target: start
      signal: SIGTERM
    run: always
  install:
    run: once
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - steamcmd
      - "+force_install_dir"
      - "/server"
      - "+login"
      - anonymous
      - "+app_update"
      - '258550'
      - "+quit"
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - wget
      - "-O"
      - oxide.zip
      - https://umod.org/games/rust/download/develop
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - unzip
      - "-o"
      - oxide.zip
      - "-d"
      - "/server"
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - rm
      - oxide.zip
serve: start
