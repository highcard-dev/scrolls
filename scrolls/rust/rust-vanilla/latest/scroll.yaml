name: artifacts.druid.gg/druid-team/scroll-rust-vanilla
desc: Rust Vanilla
version: 0.0.3
app_version: latest
ports:
- name: main
  protocol: udp
  sleep_handler: generic
  port: 28015
- name: query
  protocol: udp
  description: Steam Query Port. Use this to connect via the Steam client.
  finish_after_command: install
  sleep_handler: packet_handler/query.lua
  vars:
  - name: GameName
    value: Rust
  - name: GameSteamFolder
    value: rust
  - name: GameSteamId
    value: '0'
  - name: MapName
    value: Procedual Map
  - name: ServerListName
    value: Druid Gameserver (idle) - Start server by joining
  - name: GameVersion
    value: '1337'
  - name: GameKeywords
    value: mp0,cp0,ptrak,qp0,$r?,v2592,born0,gmrust,cs1337420
  port: 28017
- name: rustplus
  protocol: tcp
  port: 28082
- name: rcon
  protocol: tcp
  port: 28016
commands:
  start:
    needs:
    - install
    run: restart
    procedures:
    - id: coldstart
      image: artifacts.druid.gg/druid-team/druid:stable
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
      - name: query
        keepAliveTraffic: 10kb/5m
      mounts:
      - path: "/runtime"
        sub_path: "."
      working_dir: "/runtime"
      command:
      - druid-coldstarter
      - "--root"
      - "/runtime"
      - "--status-file"
      - ".coldstarter-finished.json"
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "./start.sh"
      id: start
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
      - name: query
        keepAliveTraffic: 10kb/5m
      - name: rustplus
        keepAliveTraffic: 10kb/5m
  stop:
    procedures:
    - type: signal
      target: start
      signal: SIGTERM
    run: always
  install:
    run: once
    procedures:
    - image: highcard/druid:stable-steamcmd
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - steamcmd
      - "+force_install_dir"
      - "/server"
      - "+login"
      - anonymous
      - "+app_update"
      - '258550'
      - "+quit"
serve: start
