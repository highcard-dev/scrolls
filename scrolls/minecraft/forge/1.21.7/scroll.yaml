name: artifacts.druid.gg/druid-team/scroll-minecraft-forge
desc: Minecraft Forge
version: 0.0.1
app_version: "1.21.7"
ports:
- name: main
  protocol: tcp
  port: 25565
- name: rcon
  protocol: tcp
  port: 25575
commands:
  start:
    needs:
    - install
    run: restart
    procedures:
    - id: coldstart
      image: artifacts.druid.gg/druid-team/druid:v0.1.243
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
      - name: rcon
      mounts:
      - path: "/runtime"
        sub_path: "."
      working_dir: "/runtime"
      env:
        DRUID_ROOT: "/runtime"
        DRUID_PORT_MAIN_COLDSTARTER: "packet_handler/minecraft.lua"
        DRUID_PORT_RCON_COLDSTARTER: "generic"
      command:
      - druid-coldstarter
    - image: alpine:3.20
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "./update_user_args.sh"
    - id: start
      image: eclipse-temurin:21-jre
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
      - name: rcon
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "./run.sh"
  stop:
    run: always
    procedures:
    - type: signal
      target: start
      signal: SIGTERM
  install:
    run: once
    procedures:
    - image: alpine:3.20
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - wget
      - "-q"
      - "-O"
      - forge-installer.jar
      - http://192.168.100.200:9000/snapshot-cache/minecraft/forge/forge-1.21.7.jar
    - image: eclipse-temurin:21-jre
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - java
      - "-jar"
      - forge-installer.jar
      - "--installServer"
    - image: alpine:3.20
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - rm
      - forge-installer.jar
    - image: alpine:3.20
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "-c"
      - echo eula=true > eula.txt
  update:
    procedures:
    - image: alpine:3.20
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "-c"
      - apk add --no-cache jq yq moreutils && ./update.sh
    - image: alpine:3.20
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "-c"
      - echo eula=true > eula.txt
serve: start
