name: artifacts.druid.gg/druid-team/scroll-minecraft-vanilla
desc: Minecraft Vanilla
version: 0.0.1
app_version: "1.18.2"
ports:
- name: main
  protocol: tcp
  port: 25565
  sleep_handler: packet_handler/minecraft.lua
  mandatory: true
  start_delay: 10
  finish_after_command: install
- name: rcon
  protocol: tcp
  port: 25575
  sleep_handler: generic
serve: start
commands:
  start:
    needs:
    - install
    run: restart
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:stable
      id: coldstart
      mounts:
      - path: "/runtime"
        sub_path: "."
      working_dir: "/runtime"
      env:
        DRUID_ROOT: "/runtime"
        DRUID_COLDSTARTER_STATUS_FILE: ".coldstarter-finished.json"
      command:
      - druid-coldstarter
    - image: eclipse-temurin:17-jre
      mounts:
      - path: "/server"
        sub_path: data
      working_dir: "/server"
      command:
      - sh
      - "./start.sh"
      id: start
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
  stop:
    run: always
    procedures:
    - type: signal
      target: start
      signal: SIGTERM
  install:
    run: once
    procedures:
    - image: alpine:3.20
      mounts:
      - path: "/server"
        sub_path: data
      working_dir: "/server"
      command:
      - sh
      - "-c"
      - apk add --no-cache ca-certificates wget && wget -q -O server.jar https://launcher.mojang.com/v1/objects/c8f83c5655308435b3dcf03c06d9fe8740a77469/server.jar
        && echo eula=true > eula.txt
  update:
    procedures:
    - image: alpine:3.20
      mounts:
      - path: "/server"
        sub_path: data
      working_dir: "/server"
      command:
      - sh
      - "-c"
      - apk add --no-cache jq yq moreutils && ./update.sh && echo eula=true > eula.txt
