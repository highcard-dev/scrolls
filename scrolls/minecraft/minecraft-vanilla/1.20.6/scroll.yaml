name: artifacts.druid.gg/druid-team/scroll-minecraft-vanilla
desc: Minecraft Vanilla
version: 0.0.1
app_version: 1.20.6
ports:
  - name: main
    protocol: tcp
    port: 25565
    sleep_handler: packet_handler/minecraft.lua
    mandatory: true
    start_delay: 10
    finish_after_command: install
  - name: rcon
    protocol: tcp
    port: 25575
serve: "start"
commands:
  start:
    needs: [install]
    run: restart
    procedures:
      - id: start
        image: eclipse-temurin:17-jre
        expectedPorts:
          - name: main
            keepAliveTraffic: 10kb/5m
        mounts:
          - path: /server
            sub_path: data
        working_dir: /server
        command:
          - bash
          - ./start.sh
  stop:
    run: always
    procedures:
      - type: signal
        target: start
        signal: SIGTERM
  install:
    run: once
    procedures:
      - image: alpine:3.20
        mounts:
          - path: /server
            sub_path: data
        working_dir: /server
        command:
          - sh
          - -c
          - >-
            apk add --no-cache ca-certificates wget
            && wget -q -O server.jar https://launcher.mojang.com/v1/objects/145ff0858209bcfc164859ba735d4199aafa1eea/server.jar
            && echo eula=true > eula.txt
  update:
    procedures:
      - image: alpine:3.20
        mounts:
          - path: /server
            sub_path: data
        working_dir: /server
        command:
          - sh
          - -c
          - apk add --no-cache jq yq moreutils && ./update.sh && echo eula=true > eula.txt
