name: artifacts.druid.gg/druid-team/scroll-minecraft-vanilla
desc: Minecraft Vanilla
version: 0.0.1
app_version: "1.21.1"
ports:
- name: main
  protocol: tcp
  port: 25565
  sleep_handler: packet_handler/minecraft.lua
  mandatory: true
  start_delay: 10
  finish_after_command: install
- name: rcon
  protocol: tcp
  port: 25575
  sleep_handler: generic
commands:
  start:
    needs:
    - install
    run: restart
    procedures:
    - id: coldstart
      image: artifacts.druid.gg/druid-team/druid:stable
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
      - name: rcon
      mounts:
      - path: "/runtime"
        sub_path: "."
      working_dir: "/runtime"
      env:
        DRUID_ROOT: "/runtime"
        DRUID_COLDSTARTER_STATUS_FILE: ".coldstarter-finished.json"
      command:
      - druid-coldstarter
    - id: start
      image: eclipse-temurin:21-jre
      expectedPorts:
      - name: main
        keepAliveTraffic: 10kb/5m
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "./start.sh"
  stop:
    run: always
    procedures:
    - type: signal
      target: start
      signal: SIGTERM
  install:
    run: once
    procedures:
    - image: alpine:3.20
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "-c"
      - >-
        apk add --no-cache ca-certificates wget
        && wget -q -O server.jar https://piston-data.mojang.com/v1/objects/59353fb40c36d304f2035d51e7d6e6baa98dc05c/server.jar
        && echo eula=true > eula.txt
  update:
    procedures:
    - image: alpine:3.20
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "-c"
      - apk add --no-cache jq yq moreutils && ./update.sh && echo eula=true > eula.txt
serve: start
