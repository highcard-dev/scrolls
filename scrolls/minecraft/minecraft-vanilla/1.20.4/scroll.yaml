name: artifacts.druid.gg/druid-team/scroll-minecraft-vanilla
desc: Minecraft Vanilla
version: 0.0.1
app_version: "1.20.4"
ports:
- name: main
  protocol: tcp
  port: 25565
- name: rcon
  protocol: tcp
  port: 25575
commands:
  start:
    needs:
    - install
    run: restart
    procedures:
    - id: coldstart
      image: artifacts.druid.gg/druid-team/druid:v0.1.256
      expectedPorts:
      - name: main
        keepAliveTraffic: 1mb/5m
      - name: rcon
      mounts:
      - path: "/runtime"
        sub_path: "."
      working_dir: "/runtime"
      env:
        DRUID_ROOT: "/runtime"
        DRUID_PORT_MAIN_COLDSTARTER: "packet_handler/minecraft.lua"
        DRUID_PORT_RCON_COLDSTARTER: "generic"
      command:
      - druid-coldstarter
    - id: start
      image: eclipse-temurin:17-jre
      expectedPorts:
      - name: main
        keepAliveTraffic: 1mb/5m
      - name: rcon
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "./start.sh"
  stop:
    run: always
    procedures:
    - type: signal
      target: start
      signal: SIGTERM
  install:
    run: once
    procedures:
    - id: download-server-files
      image: artifacts.druid.gg/druid-team/druid:v0.1.258
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - druid
      - progress
      - download
      - --output
      - server.jar
      - --label
      - Downloading Minecraft server files
      - https://launcher.mojang.com/v1/objects/8dd1a28015f51b1803213892b50b7b4fc76e594d/server.jar
    - image: alpine:3.20
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "-c"
      - echo eula=true > eula.txt
  update:
    procedures:
    - image: alpine:3.20
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "-c"
      - apk add --no-cache jq yq moreutils && ./update.sh && echo eula=true > eula.txt
serve: start
