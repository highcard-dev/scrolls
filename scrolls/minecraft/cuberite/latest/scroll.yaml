name: artifacts.druid.gg/druid-team/scroll-minecraft-cuberite
desc: Cuberite
version: 0.0.1
app_version: latest
ports:
- name: main
  protocol: tcp
  port: 25565
- name: webpanel
  protocol: tcp
  port: 8080
commands:
  start:
    needs:
    - install
    run: restart
    procedures:
    - id: coldstart
      image: artifacts.druid.gg/druid-team/druid:v0.1.249
      expectedPorts:
      - name: main
        keepAliveTraffic: 6mb/30m
      - name: webpanel
      mounts:
      - path: "/runtime"
        sub_path: "."
      working_dir: "/runtime"
      env:
        DRUID_ROOT: "/runtime"
        DRUID_PORT_MAIN_COLDSTARTER: "packet_handler/minecraft.lua"
        DRUID_PORT_WEBPANEL_COLDSTARTER: "generic"
      command:
      - druid-coldstarter
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "./start.sh"
      id: start
      expectedPorts:
      - name: main
        keepAliveTraffic: 6mb/30m
      - name: webpanel
        keepAliveTraffic: 6mb/30m
  stop:
    procedures:
    - type: signal
      target: start
      signal: SIGTERM
    run: always
  install:
    run: once
    procedures:
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - wget
      - "-q"
      - "-O"
      - Cuberite.tar.gz
      - https://download.cuberite.org/linux-x86_64/Cuberite.tar.gz
    - image: artifacts.druid.gg/druid-team/druid:v0.1.249
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - tar
      - "-xzf"
      - Cuberite.tar.gz
  update:
    procedures:
    - image: alpine:3.20
      mounts:
      - path: "/server"
      working_dir: "/server"
      command:
      - sh
      - "-c"
      - apk add --no-cache jq yq moreutils && ./update.sh
serve: start
